<rm828 html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Flag Matching Game</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.1/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.1/themes/smoothness/jquery-ui.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-box {
            background-color: white;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 600px;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .radio-options {
            margin: 20px 0;
        }

        #game-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
            margin-top: 20px;
        }

        .card {
            width: 120px;
            height: 120px;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            font-size: 14px;
        }

        .card img {
            max-width: 80px;
            max-height: 50px;
            margin-bottom: 5px;
        }

        .matched {
            background-color: lightgreen;
            cursor: default;
        }

        .highlight {
            border: 2px solid orange;
        }

        #match-count {
            font-size: 18px;
            color: green;
            margin-top: 20px;
        }

        #show-answer {
            display: none;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
        }

        #show-answer:hover {
            background-color: #0056b3;
        }

        #answers {
            margin-top: 20px;
            display: none;
        }

        #answer-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .answer {
            width: 120px;
            height: 120px;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            font-size: 12px;
            background-color: #f0f0f0;
        }

        .answer img {
            max-width: 60px;
            max-height: 40px;
            margin-bottom: 5px;
        }

        .answer .capital {
            font-size: 10px;
            color: #666;
        }

        .answer strong {
            font-size: 12px;
        }
    </style>

</head>

<body>

    <div class="container text-center mt-5">
        <h1>Country Flag Matching Game</h1>
        <p>Select a region and match the countries with their flags.</p>

        <div id="region-selection" class="radio-options">
            <label><input type="radio" name="region" value="Africa"> Africa</label>
            <label><input type="radio" name="region" value="Asia"> Asia</label>
            <label><input type="radio" name="region" value="Europe"> Europe</label>
            <label><input type="radio" name="region" value="Americas"> Americas</label>
            <label><input type="radio" name="region" value="Oceania"> Oceania</label>
        </div>

        <div id="board-size-selection" class="radio-options" style="display:none;">
            <label><input type="radio" name="board-size" value="4x2"> 4x2</label>
            <label><input type="radio" name="board-size" value="4x4"> 4x4</label>
        </div>

        <div id="game-board" class="d-flex justify-content-center flex-wrap mt-4"></div>

        <button id="show-answer" class="btn btn-primary mt-3">Show Answer</button>

        <p id="match-count" class="mt-3">Matches found: 0</p>

        <!-- Section to display answers below the "Show Answer" button -->
        <div id="answers">
            <h3>Answers</h3>
            <div id="answer-list"></div>
        </div>
    </div>

    <script>
        let selectedRegion = '';
        let boardSize = '';
        let matchCount = 0;
        let firstCard = null;
        let totalMatches = 0;

        $('input[name="region"]').on('change', function () {
            selectedRegion = $(this).val();
            $('#board-size-selection').show();
            resetGameBoard();
        });

        $('input[name="board-size"]').on('change', function () {
            boardSize = $(this).val();
            loadBoard(selectedRegion, boardSize);
        });

        function loadBoard(region, size) {
            resetGameBoard();
            $.getJSON(`https://www.cs.kent.ac.uk/people/staff/yh/api/country-data/countries/region/${region}`, function (data) {
                let countries = data.slice(0, size === '4x2' ? 4 : 8);
                let cards = generateCards(countries);
                shuffle(cards);
                appendCardsToBoard(cards);

                totalMatches = cards.length / 2;

                matchCount = 0;
                $('#match-count').text('Matches found: ' + matchCount);
                $('#show-answer').show();
            });
        }

        function generateCards(countries) {
            let cards = [];
            countries.forEach(country => {
                if (country.name && country.flag) {
                    // Generate two cards per country: one with name and one with flag
                    cards.push({ type: 'name', content: country.name, extra: country.capital || 'No Capital' });
                    cards.push({ type: 'flag', content: country.flag, name: country.name, extra: country.capital || 'No Capital' });
                }
            });
            return cards;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function appendCardsToBoard(cards) {
            $('#game-board').empty();
            cards.forEach(card => {
                let cardHtml = '';
                if (card.type === 'name') {
                    cardHtml = `<div class="card" data-type="${card.type}" data-content="${card.content}" data-extra="${card.extra}" data-matched="false">
                                    ${card.content}<br><small>${card.extra}</small>
                                </div>`;
                } else if (card.type === 'flag') {
                    cardHtml = `<div class="card" data-type="${card.type}" data-content="${card.content}" data-name="${card.name}" data-extra="${card.extra}" data-matched="false">
                                    <img src="${card.content}" alt="flag" onerror="this.onerror=null;this.src='fallback-flag.png';">
                                </div>`;
                }
                $('#game-board').append(cardHtml);
            });
        }

        $(document).on('click', '.card', function () {
            if ($(this).hasClass('matched') || $(this).is(firstCard)) return;

            $(this).addClass('highlight');

            if (!firstCard) {
                firstCard = $(this);
            } else {
                let isMatch = firstCard.data('content') === $(this).data('content');

                if (isMatch) {
                    firstCard.add(this).addClass('matched').removeClass('highlight');
                    matchCount++;
                    $('#match-count').text('Matches found: ' + matchCount);
                    checkForWin();
                } else {
                    setTimeout(() => {
                        firstCard.add(this).removeClass('highlight');
                    }, 500);
                }
                firstCard = null;
            }
        });

        $('#show-answer').on('click', function () {
            let answerHtml = '';
            $('.card').each(function () {
                let countryName = $(this).data('name');
                let capital = $(this).data('extra');
                let flagUrl = $(this).data('content');

                if (countryName && capital && flagUrl) {
                    answerHtml += `
                        <div class="answer">
                            <img src="${flagUrl}" alt="${countryName}">
                            <strong>${countryName}</strong><br>
                            <div class="capital">Capital: ${capital}</div>
                        </div>
                    `;
                }
            });

            $('#answer-list').html(answerHtml);
            $('#answers').show();
            $(this).prop('disabled', true);
        });

        function checkForWin() {
            if (matchCount === totalMatches) {
                setTimeout(() => {
                    alert('Congratulations! You matched all countries and flags!');
                }, 200);
            }
        }

        function resetGameBoard() {
            $('#game-board').empty();
            matchCount = 0;
            $('#match-count').text('Matches found: ' + matchCount);
            $('#show-answer').hide();
        }
    </script>

</body>

</html>
